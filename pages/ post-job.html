<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نشر وظيفة</title>
<link rel="icon" type="image/jpeg" href="img.jpg">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="form-container">

<h1>نشر وظيفة جديدة</h1>

<form id="jobForm">

    <div class="field">
        <label>اسم الوظيفة</label>
        <input type="text" id="title" required>
    </div>

    <div class="field">
        <label>اسم الشركة توضيح مسمه وظيفه</label>
        <input type="text" id="company" required>
    </div>

    <div class="field">
        <label>الولاية</label>
        <select id="stateSelect" required>
            <option value="">اختر الولاية</option>
            <option value="الخرطوم">الخرطوم</option>
            <option value="الجزيرة">الجزيرة</option>
            <option value="نهر النيل">نهر النيل</option>
            <option value="البحر الأحمر">البحر الأحمر</option>
            <option value="كسلا">كسلا</option>
            <option value="القضارف">القضارف</option>
            <option value="سنار">سنار</option>
            <option value="النيل الأبيض">النيل الأبيض</option>
            <option value="النيل الأزرق">النيل الأزرق</option>
        </select>
    </div>

    <div class="field">
        <label>المدينة</label>
        <input type="text" id="city" required>
    </div>

    <div class="field">
        <label>الراتب</label>
        <input type="text" id="salary">
    </div>

    <div class="field">
        <label>نوع الوظيفة</label>
        <select id="type">
            <option value="full">دوام كامل</option>
            <option value="part">دوام جزئي</option>
            <option value="remote">عن بعد</option>
        </select>
    </div>

    <div class="field">
        <label>تفاصيل الوظيفة</label>
        <textarea id="description" rows="5" required></textarea>
    </div>

    <div class="field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="email" required>
    </div>

    <div class="field">
        <label>رقم الهاتف</label>
        <input type="tel" id="phone" required>
    </div>

    <button type="submit">نشر الوظيفة</button>

</form>

</div>

<script type="module" src="js/post-job.js"></script>

</body>
</html>
