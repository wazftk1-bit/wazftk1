<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وظفتك - منصة التوظيف السودانية</title>
    
    <!-- ✅ Favicon - أبراج النيلين -->
    <link rel="icon" type="image/png" href="assets/favicon-towers-64.png">
    <link rel="apple-touch-icon" href="assets/favicon-towers.png">
    
    <!-- أو أهرامات مروي -->
    <!-- <link rel="icon" type="image/png" href="assets/favicon-pyramids-64.png"> -->
    <!-- <link rel="apple-touch-icon" href="assets/favicon-pyramids.png"> -->
    
    <!-- لون شريط العنوان في الجوال -->
    <meta name="theme-color" content="#1e1b4b">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-briefcase"></i>
                <h1>وظفتك</h1>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" data-tab="login">تسجيل الدخول</button>
                <button class="tab-btn" data-tab="register">إنشاء حساب</button>
            </div>

            <!-- تسجيل الدخول -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="loginEmail" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="loginPassword" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> دخول
                </button>
            </form>

            <!-- إنشاء حساب -->
            <form id="registerForm" class="auth-form" style="display:none;">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="registerEmail" required>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="registerPassword" required minlength="6">
                </div>
                <div class="form-group">
                    <label>تأكيد كلمة المرور</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-user-plus"></i> إنشاء حساب
                </button>
            </form>

            <div id="authError" class="error-text"></div>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const urlParams = new URLSearchParams(window.location.search);
        const redirect = urlParams.get('redirect') || 'index.html';

        // تبديل التبويبات
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const tab = btn.dataset.tab;
                document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
                document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
                document.getElementById('authError').textContent = '';
            });
        });

        // تسجيل الدخول
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الدخول...';
            
            try {
                await signInWithEmailAndPassword(
                    auth,
                    document.getElementById('loginEmail').value,
                    document.getElementById('loginPassword').value
                );
                window.location.href = redirect;
            } catch (error) {
                document.getElementById('authError').textContent = getErrorMessage(error.code);
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
            }
        });

        // إنشاء حساب
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('registerPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            
            if (pass !== confirm) {
                document.getElementById('authError').textContent = 'كلمتا المرور غير متطابقتين';
                return;
            }

            const btn = e.target.querySelector('button');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإنشاء...';

            try {
                await createUserWithEmailAndPassword(
                    auth,
                    document.getElementById('registerEmail').value,
                    pass
                );
                window.location.href = redirect;
            } catch (error) {
                document.getElementById('authError').textContent = getErrorMessage(error.code);
                btn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء حساب';
            }
        });

        function getErrorMessage(code) {
            const messages = {
                'auth/invalid-email': 'البريد الإلكتروني غير صالح',
                'auth/user-disabled': 'الحساب معطل',
                'auth/user-not-found': 'لا يوجد حساب بهذا البريد',
                'auth/wrong-password': 'كلمة المرور خاطئة',
                'auth/email-already-in-use': 'البريد الإلكتروني مستخدم بالفعل',
                'auth/weak-password': 'كلمة المرور ضعيفة (6 أحرف على الأقل)',
                'auth/invalid-credential': 'البريد أو كلمة المرور غير صحيحة'
            };
            return messages[code] || 'حدث خطأ، حاول مرة أخرى';
        }
    </script>
</body>
</html>
