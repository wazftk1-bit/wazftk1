<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وظفتك - منصة التوظيف السودانية</title>
    
    <!-- ✅ Favicon - أبراج النيلين -->
    <link rel="icon" type="image/png" href="assets/favicon-towers-64.png">
    <link rel="apple-touch-icon" href="assets/favicon-towers.png">
    
    <!-- أو أهرامات مروي -->
    <!-- <link rel="icon" type="image/png" href="assets/favicon-pyramids-64.png"> -->
    <!-- <link rel="apple-touch-icon" href="assets/favicon-pyramids.png"> -->
    
    <!-- لون شريط العنوان في الجوال -->
    <meta name="theme-color" content="#1e1b4b">
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
    <img src="assets/logo.svg" alt="وظفتك - منصة التوظيف السودانية" height="45">
</a>
            <div class="nav-links">
                <a href="index.html">الرئيسية</a>
                <a href="post-job.html">نشر وظيفة</a>
                <a href="my-jobs.html">وظائفي</a>
            </div>
        </div>
    </nav>

    <main class="job-details-page">
        <div class="container">
            <div id="jobContent">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i> جاري التحميل...
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const urlParams = new URLSearchParams(window.location.search);
        const jobId = urlParams.get('id');

        if (!jobId) {
            window.location.href = 'index.html';
        }

        async function loadJobDetails() {
            try {
                const jobRef = doc(db, 'jobs', jobId);
                const jobSnap = await getDoc(jobRef);

                if (!jobSnap.exists()) {
                    document.getElementById('jobContent').innerHTML = `
                        <div class="error-message">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h2>الوظيفة غير موجودة</h2>
                            <a href="index.html" class="btn btn-primary">العودة للرئيسية</a>
                        </div>
                    `;
                    return;
                }

                // زيادة عدد المشاهدات
                await updateDoc(jobRef, { views: increment(1) });

                const job = jobSnap.data();
                const date = job.createdAt ? job.createdAt.toDate().toLocaleDateString('ar-SA') : 'حديثاً';

                document.getElementById('jobContent').innerHTML = `
                    <div class="job-details-card">
                        <div class="job-header">
                            <div class="company-info">
                                <img src="${job.logo || 'https://via.placeholder.com/80?text=Logo'}" 
                                     alt="${job.company}" class="company-logo-large">
                                <div>
                                    <h1>${job.title}</h1>
                                    <p class="company-name"><i class="fas fa-building"></i> ${job.company}</p>
                                </div>
                            </div>
                            <div class="job-meta">
                                <span class="badge badge-primary">${job.category}</span>
                                <span class="badge badge-secondary">${job.type}</span>
                                <span class="views"><i class="fas fa-eye"></i> ${(job.views || 0) + 1} مشاهدة</span>
                            </div>
                        </div>

                        <div class="job-body">
                            <div class="info-grid">
                                <div class="info-item">
                                    <i class="fas fa-map-marker-alt"></i>
                                    <div>
                                        <span>الموقع</span>
                                        <strong>${job.location}</strong>
                                    </div>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-money-bill-wave"></i>
                                    <div>
                                        <span>الراتب</span>
                                        <strong>${job.salary}</strong>
                                    </div>
                                </div>
                                <div class="info-item">
                                    <i class="fas fa-calendar"></i>
                                    <div>
                                        <span>تاريخ النشر</span>
                                        <strong>${date}</strong>
                                    </div>
                                </div>
                            </div>

                            <div class="section">
                                <h3><i class="fas fa-align-right"></i> وصف الوظيفة</h3>
                                <p>${job.description.replace(/\n/g, '<br>')}</p>
                            </div>

                            <div class="section">
                                <h3><i class="fas fa-list-check"></i> المتطلبات</h3>
                                <ul class="requirements-list">
                                    ${job.requirements.map(req => `<li><i class="fas fa-check"></i> ${req}</li>`).join('')}
                                </ul>
                            </div>

                            <div class="apply-section">
                                <h3><i class="fas fa-paper-plane"></i> التقديم على الوظيفة</h3>
                                <div class="apply-box">
                                    <p><i class="fas fa-info-circle"></i> 
                                        ${job.applyMethod === 'email' ? 'أرسل سيرتك الذاتية على:' : 
                                          job.applyMethod === 'link' ? 'تقدم عبر الرابط:' : 'اتصل على:'}
                                    </p>
                                    <div class="apply-details">
                                        ${job.applyMethod === 'link' 
                                            ? `<a href="${job.applyDetails}" target="_blank" class="btn btn-primary btn-large">
                                                <i class="fas fa-external-link-alt"></i> التقديم الآن
                                               </a>`
                                            : `<span class="contact-info">${job.applyDetails}</span>
                                               <button class="btn btn-secondary" onclick="navigator.clipboard.writeText('${job.applyDetails}')">
                                                   <i class="fas fa-copy"></i> نسخ
                                               </button>`
                                        }
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="job-footer">
                            <a href="index.html" class="btn btn-outline">
                                <i class="fas fa-arrow-right"></i> العودة للوظائف
                            </a>
                        </div>
                    </div>
                `;

            } catch (error) {
                console.error(error);
                document.getElementById('jobContent').innerHTML = `
                    <div class="error-message">
                        <i class="fas fa-exclamation-circle"></i>
                        <h2>حدث خطأ في التحميل</h2>
                        <a href="index.html" class="btn btn-primary">العودة للرئيسية</a>
                    </div>
                `;
            }
        }

        loadJobDetails();
    </script>
</body>
</html>
